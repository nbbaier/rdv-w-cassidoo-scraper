name: Weekly Scrape

on:
   schedule:
      # Run every Monday at 3:00 AM UTC
      - cron: "0 3 * * 1"
   workflow_dispatch: # Allow manual triggering

jobs:
   scrape-and-update:
      runs-on: ubuntu-latest

      permissions:
         contents: write

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install dependencies
           run: bun install

         - name: Run scraper
           # COUNT defaults to 1000 (full archive) so `number = i + 1` indexes
           # against the entire history; a smaller window would assign new
           # issues a number from the window (e.g. 20) instead of continuing
           # the sequence (e.g. 458).
           run: bun run scrape

         - name: Check for changes
           id: git-check
           run: |
              if [ -n "$(git status --porcelain src/content/questions)" ]; then
                 echo "changes=true" >> $GITHUB_OUTPUT
              fi

         - name: Commit and push changes
           if: steps.git-check.outputs.changes == 'true'
           run: |
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add src/content/questions/*.md
              git commit -m "Add new interview questions [skip ci]"
              git push
